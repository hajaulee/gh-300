<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3;
    --muted:#8b949e; --accent:#2f81f7; --good:#238636; --bad:#da3633;

  * { box-sizing: border-box; }
  body {
    margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  header {
    position:sticky; top:0; background:var(--panel); border-bottom:1px solid var(--border);
    padding:12px 20px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; z-index:10;
  }
  header h1 { font-size:18px; margin:0; flex:1; }
  .stats { color:var(--muted); font-size:14px; }
  .stats b { color:var(--text); }
  .stats .good { color:#3fb950; }
  .stats .bad { color:#f85149; }
  button {
    background:var(--panel); color:var(--text); border:1px solid var(--border);
    padding:6px 14px; border-radius:6px; cursor:pointer; font-size:14px;
  }
  button:hover { background:var(--hover); }
  main { max-width: 900px; margin: 0 auto; padding: 20px; }
  .question {
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:18px 22px; margin-bottom:18px;
  }
  .qhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .qnum { color:var(--accent); font-weight:600; font-size:14px; }
  .multi { color:#d29922; font-size:12px; background:#3a2e0a; padding:2px 8px; border-radius:10px; }
  .stem { font-size:16px; font-weight:500; margin-bottom:14px; white-space:pre-wrap; }
  .options { display:flex; flex-direction:column; gap:8px; }
  .opt {
    display:flex; gap:10px; align-items:flex-start; padding:10px 12px;
    border:1px solid var(--border); border-radius:6px; cursor:pointer;
    transition: background .15s, border-color .15s;
    user-select:none;
  }
  .opt:hover { background:var(--hover); }
  .opt.selected { border-color:var(--accent); background:#0d2547; }
  .opt.correct { border-color:var(--good); background:#0f2e1a; }
  .opt.wrong { border-color:var(--bad); background:#3a1416; }
  .opt .letter {
    font-weight:700; min-width:22px; color:var(--muted);
  }
  .opt.correct .letter { color:#3fb950; }
  .opt.wrong .letter { color:#f85149; }
  .opt .text { flex:1; }
  .actions { margin-top:12px; display:flex; gap:10px; align-items:center; }
  .feedback {
    margin-top:12px; padding:12px 14px; border-radius:6px; display:none;
    font-size:14px; border:1px solid var(--border);
  }
  .feedback.show { display:block; }
  .feedback.right { background:#0f2e1a; border-color:var(--good); }
  .feedback.wrong-fb { background:#3a1416; border-color:var(--bad); }
  .feedback .label { font-weight:600; margin-bottom:6px; }
  .feedback .exp { color:var(--text); white-space:pre-wrap; }
  .footer-actions { text-align:center; padding:30px 0; }
  .toolbar { display:flex; gap:8px; }
</style>

aining data", "B": "Ability to handle complex code structures", "C": "No biases in code suggestions", "D": "Extensive support for all programming languages"}, "answer": "AD", "explanation": "GitHub Copilot Chat has limitations such as limited training data, which can affect the accuracy of its suggestions, and it does not provide extensive support for all programming languages. [Reference: GitHub Copilot Chat limitations documentation.]"}, {"num": 5, "stem": "What are two techniques that can be used to improve prompts to GitHub Copilot? (Select two.)", "options": {"A": "Provide specific success criteria", "B": "Provide all information about the utilized files", "C": "Provide insight on where to get the content from to get a response", "D": "Provide links to supporting documentation"}, "answer": "AD", "explanation": "Improving prompts involves providing specific success criteria and including links to supporting documentation to give GitHub Copilot more context and direction. [Reference: GitHub Copilot prompt engineering best practices., ]"}, {"num": 6, "stem": "What method can be used to interact with GitHub Copilot?", "options": {"A": "By using a properly configured GitHub CLI", "B": "By using chat capabilities in NeoVim", "C": "From a watch window in an IDE debug session", "D": "From a web browser at https://github.copilot.com"}, "answer": "B", "explanation": "GitHub Copilot is an AI-powered code completion tool that integrates directly into supported Integrated Development Environments (IDEs) and code editors, such as Visual Studio Code, JetBrains IDEs, NeoVim, and others. Developers interact with it through their coding environment, where it provides real-time code suggestions, autocompletions, and (in some cases) chat-like capabilities via extensions or plugins (e.g., GitHub Copilot Chat in supported editors). Evaluation of A. By using a properly configured GitHub CLIThe GitHub CLI (Command Line Interface) is a tool for interacting with GitHub repositories and "answer": "C", "explanation": "GitHub Copilot Chat combines its training data, code from user repositories, and external sources like Bing to generate comprehensive and relevant responses to coding QUESTION. [Reference: GitHub Copilot Chat documentation on data sources.]"}, {"num": 8, "stem": "How can you improve the context used by GitHub Copilot? (Each correct answer presents part of the solution. Choose two.)", "options": {"A": "By opening the relevant tabs in your IDE", "B": "By adding relevant code snippets to your prompt", "C": "By adding the important files to your .gitconfig", "D": "By adding the full file paths to your prompt of important files"}, "answer": "AB", "explanation": "Improving the context for GitHub Copilot involves opening relevant files in your IDE to provide immediate context and adding relevant code snippets directly to your prompts to give Copilot specific examples and information. [Reference: GitHub Copilot prompt engineering and context management.]"}, {"num": 9, "stem": "How can GitHub Copilot be limited when it comes to suggesting unit tests?", "options": {"A": "GitHub Copilot can generate all types of unit tests, including those for edge cases and complex integration scenarios.", "B": "GitHub Copilot primarily suggests basic unit tests that focus on core functionalities, often requiring additional input from developers for comprehensive coverage.", "C": "GitHub Copilot can handle any complexity in code and automatically generate appropriate unit tests.", "D": "GitHub Copilot's limitations in generating unit tests can vary based on the IDE version you are using."}, "answer": "B", "explanation": "GitHub Copilot often suggests basic unit tests and may not cover all edge cases or complex integration scenarios, requiring developers to supplement its suggestions. [Reference: GitHub Copilot testing limitations.]"}, {"num": 10, "stem": "How do you generate code suggestions with GitHub Copilot in the CLI?", "options": {"A": "Write code comments -> Press the suggestion shortcut -> Select the best suggestion from the list.", "B": "Use copilot suggest -> Write the command you want -> Select the best suggestion from the list.", "C": "Type out the code snippet -> Use the copilot refine command to enhance it -> Review the suggested command.", "D": "Describe the project's architecture -> Use the copilot generate command -> Accept the generated suggestion."}, "answer": "A", "explanation": "In the CLI, GitHub Copilot generates code suggestions by analyzing code comments. You write comments describing what you want, and Copilot provides relevant code suggestions. You then select the best suggestion from the list. [Reference: GitHub Copilot CLI documentation.]"}, {"num": 11, "stem": "An independent contractor develops applications for a variety of different customers. Assuming no concerns from their customers, which GitHub Copilot plan is best suited?", "options": {"A": "GitHub Copilot Individual", "B": "GitHub Copilot Business", "C": "GitHub Copilot Business for non-GHE Customers", "D": "GitHub Copilot Enterprise", "E": "GitHub Copilot Teams"}, "answer": "A", "explanation": "For an independent contractor, GitHub Copilot Individual is the most suitable and cost-effective plan. [Reference: GitHub Copilot pricing documentation., ]"}, {"num": 12, "stem": "What is a likely effect of GitHub Copilot being trained on commonly used code patterns?", "options": {"A": "Suggest homogeneous solutions if provided a diverse data set.", "B": "Suggest innovative coding solutions that are not yet popular.", "C": "Suggest code snippets that reflect the most common practices in the training data.", "D": "Suggest completely novel projects, while reducing time on a project."}, "answer": "C", "explanation": "GitHub Copilot is likely to suggest code snippets that reflect common practices in its training data, as it learns from frequently used patterns. [Reference: GitHub Copilot training data documentation.]"}, {"num": 13, "stem": "What is the best way to share feedback about GitHub Copilot Chat when using it on GitHub Mobile?", "options": {"A": "The Settings menu in the GitHub Mobile app.", "B": "The feedback section on the GitHub website.", "C": "Use the emojis in the Copilot Chat interface.", "D": "By tweeting at GitHub's official X (previously known as Twitter) account."}, "answer": "C", "explanation": "The best way to share feedback on GitHub Mobile is using the emojis in the Copilot Chat interface, which allows for direct and immediate feedback. [Reference: GitHub Copilot Mobile documentation.]"}, {"num": 14, "stem": "In what way can GitHub Copilot and GitHub Copilot Chat aid developers in modernizing applications?", "options": {"A": "GitHub Copilot can directly convert legacy applications into cloud-native architectures.", "B": "GitHub Copilot can suggest modern programming patterns based on your code.", "C": "GitHub Copilot can create and deploy full-stack applications based on a single query.", "D": "GitHub Copilot can refactor applications to align with upcoming standards."}, "answer": "B", "explanation": "GitHub Copilot and GitHub Copilot Chat are powerful AI-driven tools designed to assist developers by providing context-aware code suggestions and interactive support. Specifically, in the context of modernizing applications, GitHub Copilot excels at analyzing existing code and suggesting modern programming patterns, best practices, and syntax improvements that align with contemporary development standards. For example, it can recommend updates to outdated constructs, propose more efficient algorithms, or suggest frameworks and libraries that are widely used in modern application development. Why not A?GitHub Copilot does not \"directly convert\" legacy applications into cloud-native architectures. It can assist by suggesting code changes or patterns that support such a transition, but it doesn't autonomously perform the full conversion process, which involves architectural decisions and deployment steps beyond its scope. Why not C?While GitHub Copilot can generate code snippets and even larger portions of an application, it cannot create and deploy full-stack applications from a single query. It requires developer input, refinement, and integration to achieve a complete, deployable solution. Why not D?GitHub Copilot can assist with refactoring by suggesting improvements to existing code, but it doesn't inherently \"align with upcoming standards\" in a predictive sense. Its suggestions are based on current best practices and the data it was trained on, not future standards that are yet to be defined. Thus,Bis the most accurate and realistic way GitHub Copilot aids developers in modernizing applications, leveraging its ability to provide relevant, context-based suggestions to update and improve codebases. [Reference: GitHub Copilot documentation on application modernization., ]"}, {"num": 15, "stem": "How can the concept of fairness be integrated into the process of operating an AI tool?", "options": {"A": "Focusing on accessibility will ensure fairness.", "B": "Focusing on collecting large datasets for training will ensure fairness.", "C": "Regularly monitoring the AI tool's performance will ensure fairness in its outputs.", "D": "Training AI data and algorithms to be free from biases will ensure fairness."}, "answer": "D", "explanation": "Fairness in AI tools is achieved by training the data and algorithms to be free from biases. This ensures that the tool treats all users equitably and avoids discriminatory outcomes. [Reference: Microsoft's AI principles and fairness guidelines.]"}, {"num": 16, "stem": "What is the correct way to exclude specific files from being used by GitHub Copilot Business during code suggestions?", "options": {"A": "Modify the .gitignore file to include the specific files.", "B": "Add the specific files to a copilot.ignore file.", "C": "Use the GitHub Copilot settings in the user interface to exclude files.", "D": "Rename the files to include the suffix _no_copilot."}, "answer": "C", "explanation": "The correct way to exclude files is through the GitHub Copilot settings in the user interface, which allows administrators to specify files and directories to be ignored. [Reference: GitHub Copilot Business content exclusion documentation.]"}, {"num": 17, "stem": "Why might a Generative AI (Gen AI) tool create inaccurate outputs?", "options": {"A": "The Gen AI tool is overloaded with too many requests at once.", "B": "The Gen AI tool is experiencing downtime and is not fully recovered.", "C": "The Gen AI tool is programmed with a focus on creativity over factual accuracy.", "D": "The training data might contain biases or inconsistencies."}, "answer": "D", "explanation": "Gen AI tools can produce inaccurate outputs if the training data contains biases or inconsistencies, which can lead to flawed or misleading results. [Reference: Generative AI limitations documentation., ]"}, {"num": 18, "stem": "Select a strategy to increase the performance of GitHub Copilot Chat.", "options": {"A": "Use a single GitHub Copilot Chat query to find resolutions for the collection of technical requirements", "B": "Limit the number of concurrent users accessing GitHub Copilot Chat", "C": "Apply prompt engineering techniques to be more specific", "D": "Optimize the usage of memory-intensive operations within generated code"}, "answer": "C", "explanation": "Applying prompt engineering techniques to be more specific is the best strategy to increase the performance and relevance of GitHub Copilot Chat's responses. [Reference: GitHub Copilot prompt engineering best practices.]"}, {"num": 19, "stem": "What method can a developer use to generate sample data with GitHub Copilot? (Each correct answer presents part of the solution. Choose two.)", "options": {"A": "Utilizing GitHub Copilot's ability to create fictitious information from patterns in training data.", "B": "Leveraging GitHub Copilot's ability to independently initiate and manage data storage services.", "C": "Utilize GitHub Copilot's capability to directly access and use databases to create sample data.", "D": "Leveraging GitHub Copilot's suggestions to create data based on API documentation in the repository."}, "answer": "AD", "explanation": "GitHub Copilot can generate sample data by creating fictitious information based on patterns in its training data and by using suggestions based on API documentation within the repository. [Reference: GitHub Copilot documentation on data generation assistance.]"}, {"num": 20, "stem": "What is a benefit of using custom models in GitHub Copilot?", "options": {"A": "Responses are faster to produce and appear sooner", "B": "Responses use practices and patterns in your repositories", "C": "Responses use the organization's LLM engine", "D": "Responses are guaranteed to be correct"}, "answer": "B", "explanation": "Custom models in GitHub Copilot allow the tool to learn from the specific code patterns and practices within your repositories. This results in suggestions that are more aligned with your organization's coding standards and conventions, improving the relevance and accuracy of the generated code. [Reference: GitHub Copilot Enterprise documentation on custom models.]"}, {"num": 21, "stem": "Which Copilot Individual features are available when using a supported extension for Visual Studio, VS Code, or JetBrains IDEs? (Each correct answer presents part of the solution. Choose two.)", "options": {"A": "Code suggestions", "B": "Chat", "C": "Knowledge Base", "D": "Pull Request Diff Analysis"}, "answer": "AB", "explanation": "GitHub Copilot Individual provides code suggestions and chat features when used with supported IDE extensions like Visual Studio, VS Code, and JetBrains IDEs. [Reference: GitHub Copilot Individual features documentation.]"}, {"num": 22, "stem": "What content can be configured to be excluded with content exclusions? (Each correct answer presents part of the solution. Choose three.)", "options": {"A": "Lines in files", "B": "Files", "C": "Folders", "D": "Repositories", "E": "Gists"}, "answer": "BCD", "explanation": "Content exclusions allow you to exclude files, folders, and repositories from being used by GitHub Copilot. [Reference: GitHub Copilot content exclusion documentation.]"}, {"num": 23, "stem": "How does the /tests slash command assist developers?", "options": {"A": "Constructs detailed test documentation.", "B": "Creates unit tests for the selected code.", "C": "Integrates with external testing frameworks.", "D": "Executes test cases to find issues with the code."}, "answer": "B", "explanation": "The /tests slash command in GitHub Copilot Chat creates unit tests for the selected code, helping developers ensure the functionality and reliability of their code. [Reference: GitHub Copilot Chat command documentation.]"}, {"num": 24, "stem": "How long does it take content exclusion to add or be updated?", "options": {"A": "Up to 30 minutes", "B": "45 - 60 minutes", "C": "60 - 90 minutes", "D": "24 hours"}, "answer": "A", "explanation": "Content exclusions typically take up to 30 minutes to be added or updated. [Reference: GitHub Copilot content exclusion documentation.]"}, {"num": 25, "stem": "What is the correct way to access the audit log events for GitHub Copilot Business?", "options": {"A": "Navigate to the Security tab in the organization's GitHub settings", "B": "Navigate to the Insights tab in the repository settings", "C": "Use the Audit log section in the organization's GitHub settings", "D": "Use the Code tab in the GitHub repository"}, "answer": "C", "explanation": "Audit log events for GitHub Copilot Business can be accessed through the Audit log section within the organization's GitHub settings. This log provides a record of activities related to Copilot usage and configuration. [Reference: GitHub Copilot Business documentation on audit logs.]"}, {"num": 26, "stem": "Which of the following prompts can be used to guide GitHub Copilot Chat in refactoring code for quality improvements? (Each correct answer presents part of the solution. Choose two.)", "options": {"A": "\"Show me how to improve the readability of this function.\"", "B": "\"Suggest ways to enhance the maintainability of this code segment.\"", "C": "\"Refactor my application to meet the latest coding standards.\"", "D": "\"Predict future coding trends and update my codebase accordingly.\""}, "answer": "AB", "explanation": "Effective prompts for refactoring include requests that focus on specific quality improvements, such as readability and maintainability. These prompts guide GitHub Copilot to provide relevant and actionable suggestions. [Reference: GitHub Copilot prompt engineering best practices., , ]"}, {"num": 27, "stem": "Which of the following is correct about GitHub Copilot Knowledge Bases?", "options": {"A": "All repos are indexed", "B": "Indexing is static", "C": "It is an Enterprise feature", "D": "All file types are indexed"}, "answer": "C", "explanation": "GitHub Copilot Knowledge Bases is an Enterprise feature that allows the tool to use an organization's internal documentation and code for more accurate and relevant suggestions. [Reference: GitHub Copilot Enterprise Knowledge Base documentation.]"}, {"num": 28, "stem": "How does GitHub Copilot Chat ensure that a function works correctly?", "options": {"A": "By suggesting assertions based on the code's context and semantics.", "B": "By automatically writing all the tests for the function.", "C": "By writing the implementation code for the function.", "D": "By executing the test cases to validate the correctness of the code."}, "answer": "A", "explanation": "GitHub Copilot Chat can suggest assertions based on the code's context and semantics to help developers verify the correctness of their functions. These assertions serve as checks that the function behaves as expected under various conditions. [Reference: GitHub Copilot documentation on testing and code verification.]"}, {"num": 29, "stem": "How can GitHub Copilot assist developers during the requirements analysis phase of the Software Development Life Cycle (SDLC)?", "options": {"A": "By automatically generating detailed requirements documents.", "B": "By providing templates and code snippets that help in documenting requirements.", "C": "By identifying and fixing potential requirement conflicts when using /help.", "D": "By managing stakeholder communication and meetings."}, "answer": "B", "explanation": "GitHub Copilot can assist during the requirements analysis phase by providing templates and code snippets that aid in documenting requirements. This helps streamline the process of capturing and organizing project requirements. [Reference: GitHub Copilot documentation on SDLC assistance.]"}, {"num": 30, "stem": "Why is code reviewing still necessary when using GitHub Copilot to write tests?", "options": {"A": "Because GitHub Copilot can cover all possible scenarios in your test cases.", "B": "Because GitHub Copilot generates the best code possible for the test scenario.", "C": "Because GitHub Copilot's generated test cases may not cover all possible scenarios.", "D": "Because GitHub Copilot replaces the need for manual testing."}, "answer": "C", "explanation": "Code review is necessary because GitHub Copilot's generated test cases might not cover all possible scenarios, especially edge cases and complex interactions. [Reference: GitHub Copilot testing best practices.]"}, {"num": 31, "stem": "Which of the following statements best describes the impact of GitHub Copilot on the software development process?", "options": {"A": "It decreases software vulnerabilities from third party dependencies.", "B": "It reduces overhead by automating testing workflows.", "C": "It increases productivity by automating repetitive coding tasks.", "D": "It replaces the need for developers in the software development process."}, "answer": "C", "explanation": "GitHub Copilot primarily impacts the software development process by increasing productivity through automating repetitive coding tasks. [Reference: GitHub Copilot impact documentation., ]"}, {"num": 32, "stem": "Identify the right use cases where GitHub Copilot Chat is most effective. (Each correct answer presents part of the solution. Choose two.)", "options": {"A": "Create a technical requirement specification from the business requirement documentation", "B": "Explain a legacy COBOL code and translate the code to another language like Python.", "C": "Creation of a unit test scenario for newly developed Python code", "D": "Creation of end-to-end performance testing scenarios for a web application"}, "answer": "BC", "explanation": "GitHub Copilot Chat is effective for explaining and translating legacy code and generating unit test scenarios for new code. [Reference: GitHub Copilot Chat use cases.]"}, {"num": 33, "stem": "Which of the following scenarios best describes the intended use of GitHub Copilot Chat as a tool?", "options": {"A": "A complete replacement for developers generating code.", "B": "A productivity tool that provides suggestions, but relying on human judgment.", "C": "A solution for software development, requiring no additional input or oversight.", "D": "A tool solely designed for debugging and error correction."}, "answer": "B", "explanation": "GitHub Copilot Chat is designed to be a productivity enhancer, not a replacement for human developers. It provides suggestions and assists with coding tasks, but the final decision and validation always rest with the developer. Copilot Chat is meant to augment the developer's workflow, making it faster and more efficient, but it does not remove the need for human oversight and judgment. [Reference: GitHub Copilot official documentation on the tool's purpose and usage.]"}, {"num": 34, "stem": "How does GitHub Copilot Chat help in understanding the existing codebase?", "options": {"A": "By running code linters and formatte const stats = { answered:0, correct:0, wrong:0 };
const state = {}; // qnum -> { picked:Set, submitted:bool, isCorrect:bool }

function updateStats(){
  document.getElementById('answered').textContent = stats.answered;
  document.getElementById('correct').textContent = stats.correct;
  document.getElementById('wrong').textContent = stats.wrong;
}

function buildQuestion(q){
  const wrap = document.createElement('div');
  wrap.className = 'question';
  wrap.id = 'q' + q.num;
  const correctSet = new Set(q.answer.split(''));
  const isMulti = correctSet.size > 1;
  state[q.num] = { picked: new Set(), submitted:false, isCorrect:false };

  const head = document.createElement('div');
  head.className = 'qhead';
  head.innerHTML = `<span class="qnum">Câu ${q.num}/75</span>` +
    (isMulti ? `<span class="multi">Chọn ${correctSet.size} đáp án</span>` : '');
  wrap.appendChild(head);

  const stem = document.createElement('div');
  stem.className = 'stem';
  stem.textContent = q.stem;
  wrap.appendChild(stem);

  const opts = document.createElement('div');
  opts.className = 'options';
  const letters = Object.keys(q.options).sort();
  const optEls = {};
  letters.forEach(letter => {
    const el = document.createElement('div');
    el.className = 'opt';
    el.dataset.letter = letter;
    el.innerHTML = `<span class="letter">${letter}.</span><span class="text"></span>`;
    el.querySelector('.text').textContent = q.options[letter];
    el.addEventListener('click', () => onPick(q, letter, el, isMulti, correctSet, optEls, fb, submitBtn));
    opts.appendChild(el);
    optEls[letter] = el;
  });
  wrap.appendChild(opts);

  const actions = document.createElement('div');
  actions.className = 'actions';
  const submitBtn = document.createElement('button');
  submitBtn.textContent = isMulti ? 'Xem đáp án' : 'Xem đáp án';
  submitBtn.style.display = isMulti ? 'inline-block' : 'none';
  submitBtn.addEventListener('click', () => reveal(q, correctSet, optEls, fb, submitBtn));
  actions.appendChild(submitBtn);
  wrap.appendChild(actions);

  const fb = document.createElement('div');
  fb.className = 'feedback';
  wrap.appendChild(fb);

  return wrap;
}

function onPick(q, letter, el, isMulti, correctSet, optEls, fb, submitBtn){
  const s = state[q.num];
  if (s.submitted) return;
  if (isMulti){
    if (s.picked.has(letter)){
      s.picked.delete(letter);
      el.classList.remove('selected');
    } else {
      s.picked.add(letter);
      el.classList.add('selected');
    }
  } else {
    s.picked = new Set([letter]);
    Object.values(optEls).forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    reveal(q, correctSet, optEls, fb, submitBtn);
  }
}

function reveal(q, correctSet, optEls, fb, submitBtn){
  const s = state[q.num];
  if (s.submitted) return;
  if (s.picked.size === 0) return;
  s.submitted = true;
  submitBtn.disabled = true;
  submitBtn.style.opacity = .5;

  // mark options
  Object.entries(optEls).forEach(([letter, el]) => {
    el.classList.remove('selected');
    if (correctSet.has(letter)) el.classList.add('correct');
    if (s.picked.has(letter) && !correctSet.has(letter)) el.classList.add('wrong');
  });

  // determine correctness
  let same = s.picked.size === correctSet.size;
  if (same) for (const x of s.picked) if (!correctSet.has(x)) { same=false; break; }
  s.isCorrect = same;

  fb.classList.add('show');
  fb.classList.add(same ? 'right' : 'wrong-fb');
  const answerStr = [...correctSet].sort().join(', ');
  fb.innerHTML = '';
  const lab = document.createElement('div');
  lab.className = 'label';
  lab.textContent = same ? `✓ Chính xác! Đáp án: ${answerStr}` : `✗ Chưa đúng. Đáp án đúng: ${answerStr}`;
  fb.appendChild(lab);
  if (q.explanation && q.explanation.trim()){
    const ex = document.createElement('div');
    ex.className = 'exp';
    ex.textContent = q.explanation;
    fb.appendChild(ex);
  }

  stats.answered += 1;
  if (same) stats.correct += 1; else stats.wrong += 1;
  updateStats();
}

function render(){
  const root = document.getElementById('quiz');
  root.innerHTML = '';
  stats.answered = 0; stats.correct = 0; stats.wrong = 0;
  for (const k of Object.keys(state)) delete state[k];
  QUIZ_DATA.forEach(q => root.appendChild(buildQuestion(q)));
  updateStats();
}

document.getElementById('resetBtn').addEventListener('click', render);
document.getElementById('resetBtn2').addEventListener('click', () => { render(); window.scrollTo(0,0); });
render();
</script>
